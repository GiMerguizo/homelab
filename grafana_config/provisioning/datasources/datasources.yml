apiVersion: 1

datasources:
  # 1. Configuração do Prometheus
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false # 'false' impede que alguém altere via interface gráfica

  # 2. Configuração do Zabbix
  - name: Zabbix
    type: alexanderzobnin-zabbix-datasource
    access: proxy
    # O Grafana se comunica com o Zabbix Web pela porta interna 8080 configurada no seu compose
    url: http://zabbix-web:8080/api_jsonrpc.php
    jsonData:
      username: Admin # Usuário padrão da API do Zabbix
      password: zabbix # Senha padrão da API
      trends: true
    editable: false